<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <title>Nyheter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Nyheter</h1>
    <div id="articles"></div>

    <!-- 1. CDN først -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.6/dist/supabase.min.js"></script>

    <!-- 2. Ditt script etter CDN -->
    <script>
      // Opprett klient
      const supabaseUrl = "https://uputgeqzixncefxjzdkz.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwdXRnZXF6aXhuY2VmeGp6ZGt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDQwNTYsImV4cCI6MjA4ODcyMDA1Nn0.d_N3g5r7ZbKkQhXFPf3e3LgCOY1ommZSGdILwgGZy7E";
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      async function loadArticles() {
        console.log("Henter artikler...");
        const { data: articles, error } = await supabaseClient
          .from("articles")
          .select("*")
          .order("published_at", { ascending: false })
          .limit(20);

        console.log("Articles:", articles, "Error:", error);

        const container = document.getElementById("articles");
        if (error) {
          container.innerText = "Error fetching articles: " + error.message;
          return;
        }

        container.innerHTML = "";
        articles.forEach((a) => {
          const div = document.createElement("div");
          div.className = "article";
          div.innerHTML = `
            <a href="${a.link}" target="_blank">${a.title}</a>
            <small>${a.source} | ${new Date(a.published_at).toLocaleString()}</small>
          `;
          container.appendChild(div);
        });
      }

      loadArticles();
    </script>
  </body>
</html>
